name: Publish OCI Package

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake gcc-arm-none-eabi libnewlib-arm-none-eabi git make python3

      - name: Fetch Pico SDK
        run: |
          if [ ! -d picocalc/pico-sdk/.git ]; then
            git clone --depth 1 https://github.com/raspberrypi/pico-sdk picocalc/pico-sdk
          fi

      - name: Build PicoCalc UF2
        run: |
          make picocalc

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mellivora-picocalc-uf2
          path: picocalc/build/mellivora_picocalc.uf2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
