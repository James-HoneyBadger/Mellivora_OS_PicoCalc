<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f232b"/>
      <stop offset="100%" stop-color="#0f1116"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08140d"/>
      <stop offset="100%" stop-color="#030806"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <rect x="120" y="70" rx="36" ry="36" width="1160" height="760" fill="#555b66" filter="url(#shadow)"/>
  <rect x="150" y="100" rx="26" ry="26" width="1100" height="700" fill="#242932"/>

  <rect x="210" y="140" rx="18" ry="18" width="660" height="620" fill="#0a0d11" stroke="#737b89" stroke-width="4"/>
  <rect x="230" y="160" rx="10" ry="10" width="620" height="580" fill="url(#screen)" stroke="#1b6c3c" stroke-width="2"/>

  <g font-family="monospace" filter="url(#glow)">
    <text x="255" y="195" font-size="18" fill="#9dffb8">Mellivora OS — PicoCalc</text>
    <text x="620" y="195" font-size="16" fill="#7ceaa1">SD: mounted</text>
    <text x="730" y="195" font-size="16" fill="#7ceaa1">BAT: 82%</text>

    <line x1="250" y1="210" x2="830" y2="210" stroke="#1e8f4f" stroke-width="1" opacity="0.7"/>

    <text x="255" y="245" font-size="15" fill="#7ceaa1">  __  __     _ _ _</text>
    <text x="255" y="267" font-size="15" fill="#7ceaa1"> |  \/  |___| | (_)___ ____ _ _ _ __ _</text>
    <text x="255" y="289" font-size="15" fill="#7ceaa1"> | |\/| / -_) | | \ V / _ \ '_/ _  |</text>
    <text x="255" y="311" font-size="15" fill="#7ceaa1"> |_|  |_\___|_|_|_|\_/\___/_| \__,_|</text>

    <text x="255" y="350" font-size="17" fill="#d8ffe3">Home</text>
    <text x="255" y="378" font-size="15" fill="#9dffb8">1  Dashboard</text>
    <text x="255" y="404" font-size="15" fill="#9dffb8">2  File browser</text>
    <text x="255" y="430" font-size="15" fill="#9dffb8">3  Notes</text>
    <text x="255" y="456" font-size="15" fill="#9dffb8">4  Calculator</text>
    <text x="255" y="482" font-size="15" fill="#9dffb8">5  Clock and calendar</text>
    <text x="255" y="508" font-size="15" fill="#9dffb8">6  BASIC</text>
    <text x="255" y="534" font-size="15" fill="#9dffb8">7  Tiny C</text>
    <text x="255" y="560" font-size="15" fill="#9dffb8">8  Samples</text>

    <rect x="248" y="588" width="330" height="34" rx="5" fill="#10361f" stroke="#2bc06a"/>
    <text x="260" y="610" font-size="15" fill="#f0fff5">&gt; PicoLair:/&gt; settings</text>

    <text x="255" y="655" font-size="14" fill="#79ce93">backlight: 180   startup: home   autorun: /BOOT.SCR</text>
    <text x="255" y="680" font-size="14" fill="#79ce93">notes: /NOTES.TXT   home: /WORK</text>
  </g>

  <g transform="translate(910,155)">
    <text x="0" y="0" font-family="sans-serif" font-size="30" font-weight="700" fill="#f5f7fb">PicoCalc OS Preview</text>
    <text x="0" y="38" font-family="sans-serif" font-size="18" fill="#c5cfdd">A mock screenshot of the current Mellivora interface style</text>

    <rect x="0" y="80" width="280" height="150" rx="18" fill="#2d3440" stroke="#657187"/>
    <text x="20" y="115" font-family="sans-serif" font-size="18" fill="#ffffff">Visual direction</text>
    <text x="20" y="145" font-family="sans-serif" font-size="15" fill="#d3d9e5">• Dark terminal-first UI</text>
    <text x="20" y="170" font-family="sans-serif" font-size="15" fill="#d3d9e5">• Green phosphor-style text</text>
    <text x="20" y="195" font-family="sans-serif" font-size="15" fill="#d3d9e5">• Fast launcher + shell prompt</text>

    <rect x="0" y="255" width="280" height="185" rx="18" fill="#2d3440" stroke="#657187"/>
    <text x="20" y="290" font-family="sans-serif" font-size="18" fill="#ffffff">Built-in apps</text>
    <text x="20" y="320" font-family="sans-serif" font-size="15" fill="#d3d9e5">Dashboard</text>
    <text x="20" y="345" font-family="sans-serif" font-size="15" fill="#d3d9e5">Browser</text>
    <text x="20" y="370" font-family="sans-serif" font-size="15" fill="#d3d9e5">Notes</text>
    <text x="20" y="395" font-family="sans-serif" font-size="15" fill="#d3d9e5">Calc / BASIC / Tiny C</text>

    <rect x="0" y="465" width="280" height="145" rx="18" fill="#2d3440" stroke="#657187"/>
    <text x="20" y="500" font-family="sans-serif" font-size="18" fill="#ffffff">New feature</text>
    <text x="20" y="530" font-family="sans-serif" font-size="15" fill="#d3d9e5">Persistent settings now</text>
    <text x="20" y="555" font-family="sans-serif" font-size="15" fill="#d3d9e5">save startup and notes</text>
  </g>
</svg>